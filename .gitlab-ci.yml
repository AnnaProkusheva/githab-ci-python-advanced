stages:
  - lint
  - test

image: python:3.12-slim

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install pytest-cov

lint:
  stage: lint
  script:
    - isort --check-only .
    - black --check .
    - flake8 .
    - mypy .

tests:
  stage: test
  script:
    - pytest --cov=app --cov-report=xml:coverage.xml